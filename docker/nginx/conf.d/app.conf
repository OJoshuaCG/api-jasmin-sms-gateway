# Upstream apuntando al servicio 'api' de Docker Compose (puerto interno 8000)
upstream fastapi_backend {
    server api:8000;
    keepalive 32;
}

# ── HTTP (puerto 80) ──────────────────────────────────────────────────────────
# En producción con SSL, descomentar el redirect y comentar el bloque location /
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # Necesario para la verificación ACME de Let's Encrypt / Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Opción A: HTTP directo (sin SSL) ─────────────────────────────────────
    # Usar cuando no hay certificado SSL configurado todavía.
    location / {
        proxy_pass          http://fastapi_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";

        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Opción B: Redirigir a HTTPS (activar después de obtener certificado) ──
    # Comentar el bloque "Opción A" y descomentar la siguiente línea:
    # return 301 https://$host$request_uri;
}


